<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>G7 BBS Register</title>
    <link rel="stylesheet" href="css/register.css" />
  </head>
  <body>
    <header>
      <h1>BBS</h1>
      <nav>
        <a href="index.html">Home</a>
        <a href="contact.html">Contact</a>
      </nav>
    </header>

    <section class="register-section">
      <div class="register-form">
        <img
          src="assets/images/IMG-20260209-WA0042.jpg"
          alt="Logo"
          class="login-image"
        />
        <h2>Create account</h2>
        <p class="subtitle">Join the Book Borrowing System</p>

        <form id="registerForm">
          <div class="form-group">
            <label>Full Name</label>
            <input id="fullName" type="text" placeholder="John Doe" required />
          </div>

          <div class="form-group">
            <label>Email Address</label>
            <input id="email" type="email" placeholder="you@example.com" required />
          </div>

          <div class="form-group password-group">
            <label>Password</label>
            <input id="password" type="password" placeholder="••••••••" required />
          </div>

          <div class="form-group password-group">
            <label>Confirm Password</label>
            <input id="confirmPassword" type="password" placeholder="••••••••" required />
          </div>

          <button id="registerBtn" type="submit">Create Account</button>
        </form>
        <p id="registerError" class="error-text" style="display:none; text-align: center; color: red; font-weight: 400;"></p>
        <p id="registerSuccess" class="success-text" style="display:none; text-align: center; color: green; font-weight: 400;"></p>

        <p class="sign-in">
          Already have an account?
          <a href="login.html">Sign in</a>
        </p>
      </div>
    </section>

    <footer>&copy; 2026 Book Borrowing System. All rights reserved.</footer>
    <script src="js/register.js"></script>
  </body>
</html>
