<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>G7 BBS Login</title>
    <link rel="stylesheet" href="css/login.css" />
  </head>
  <body>
    <header>
      <h1>BBS</h1>
      <nav>
        <a href="index.html">Home</a>
        <a href="contact.html">Contact</a>
      </nav>
    </header>

    <section class="login-section">
      <div class="login-form">
        <img
          src="assets/images/IMG-20260209-WA0042.jpg"
          alt="Logo"
          class="login-image"
        />
        <h2>Sign in</h2>
        <p class="subtitle">Welcome back to Book Borrowing System</p>

        <form id="loginForm">
          <div class="form-group">
            <label for="email">Email Address</label>
            <input
              type="email"
              id="email"
              placeholder="you@example.com"
              required
            />
          </div>

          <div class="form-group">
            <label for="password">Password</label>
            <input
              type="password"
              id="password"
              placeholder="••••••••"
              required
            />
          </div>

          <a href="#" class="forgot-password">Forgot password?</a>

          <button type="submit" id="loginBtn">Sign in</button>
        </form>
        <p id="loginError" class="errorText" style="display:none; text-align: center; color: red; font-weight: 400;"></p>

        <p class="sign-up">
          Don't have an account?
          <a href="register.html">Create account</a>
        </p>
      </div>
    </section>

    <footer>&copy; 2026 Book Borrowing System. All rights reserved.</footer>
    <script src="js/login.js"></script>
  </body>
</html>
