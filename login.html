<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>G7 BBS Login</title>
    <link rel="stylesheet" href="CSS/login.css" />
  </head>
  <body>
    <header>
      <h1>BBS</h1>
      <nav>
        <a href="index.html">Home</a>
        <a href="contact.html">Contact</a>
      </nav>
    </header>

    <section class="login-section">
      <div class="login-form">
        <img
          src="assets/images/IMG-20260209-WA0042.jpg"
          alt="Logo"
          class="login-image"
        />
        <h2>Sign in</h2>
        <p class="subtitle">Welcome back to Book Borrowing System</p>

        <form id="loginForm">
          <div class="form-group">
            <label for="email">Email Address</label>
            <input
              type="email"
              id="email"
              placeholder="you@example.com"
              required
            />
          </div>

          <div class="form-group">
            <label for="password">Password</label>
            <input
              type="password"
              id="password"
              placeholder="••••••••"
              required
            />
          </div>

          <a href="#" class="forgot-password">Forgot password?</a>

          <button type="submit">Sign in</button>
        </form>

        <p class="sign-up">
          Don't have an account?
          <a href="register.html">Create account</a>
        </p>
      </div>
    </section>

    <footer>&copy; 2026 Book Borrowing System. All rights reserved.</footer>

    <script>
      /**
       * Pure Front-End Login Logic
       * Verifies credentials against Local Storage for flash-drive use.
       */
      document.getElementById('loginForm').addEventListener('submit', function(event) {
        event.preventDefault(); // Prevent page reload

        const emailInput = document.getElementById('email').value;
        const passwordInput = document.getElementById('password').value;

        // 1. Retrieve the 'user_info' we saved in register.html
        const savedUser = JSON.parse(localStorage.getItem('user_info'));

        // 2. Check if a user exists and if credentials match
        if (savedUser && savedUser.email === emailInput && savedUser.password === passwordInput) {
          alert("Login Successful! Welcome, " + savedUser.fullName);
          
          // 3. Redirect to your dashboard (matching your misspelled filename)
          window.location.href = "dashborad.html";
        } else {
          // 4. Handle errors if no user is found or password is wrong
          alert("Invalid email or password. Please try again or register.");
        }
      });
    </script>
  </body>
</html>
